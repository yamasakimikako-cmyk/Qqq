<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mini Mario Touch</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #5c94fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(#5c94fc 0%, #7db7ff 60%, #b8e6ff 100%);
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.35);
      font-weight: 700;
      font-size: 15px;
      pointer-events: none;
    }

    .message {
      position: fixed;
      left: 50%;
      top: 18%;
      transform: translateX(-50%);
      z-index: 30;
      min-width: 260px;
      max-width: 86vw;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 18px 16px;
      display: none;
      box-shadow: 0 12px 32px rgba(0,0,0,0.28);
    }

    .message.show { display: block; }

    .message h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .message p {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .message button {
      appearance: none;
      border: none;
      border-radius: 999px;
      background: white;
      color: #111;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 14px;
    }

    .controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 25;
